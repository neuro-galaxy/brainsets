name: Pipeline Testing Matrix

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "*" ]

permissions:
  contents: read

env:
  # Temporary CI override: install torch_brain from this commit because
  # SEEGDatasetMixin is not yet available on torch_brain main. Revert by
  # removing TORCH_BRAIN_SHA and the "Override torch_brain to SEEG mixin SHA" step
  # after torch_brain main includes commit 8aa2335ce76c895d681148c22ef3dc01a2bc6fcc.
  TORCH_BRAIN_SHA: "8aa2335ce76c895d681148c22ef3dc01a2bc6fcc"

jobs:
  pipeline-testing-matrix:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.6.11"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install the project
      run: uv sync --all-extras

    - name: Override torch_brain to SEEG mixin SHA
      run: uv pip install --upgrade "torch_brain @ git+https://github.com/neuro-galaxy/torch_brain.git@${TORCH_BRAIN_SHA}"

    - name: Download pei_pandarinath_nlb_2021
      run: |
        uv run brainsets config --raw-dir data/raw --processed-dir data/processed
        uv run brainsets prepare pei_pandarinath_nlb_2021

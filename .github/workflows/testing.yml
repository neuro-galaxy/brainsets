name: Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  testing:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.6.11"
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install the project
      run: uv sync --all-extras
      
    - name: Install plugin
      run: uv pip install pytest-github-actions-annotate-failures

    - name: Test with pytest
      run: |
        uv run pytest --cov=brainsets --cov-report=xml --cov-report=term-missing -v

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  discover-changed-openneuro-pipelines:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Discover changed OpenNeuro pipelines
      id: discover
      run: |
        CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}" -- "brainsets_pipelines/*/pipeline.py")
        if [ -z "$CHANGED_FILES" ]; then
          MATRIX='{"include":[]}'
        else
          MATRIX=$(python3 .github/scripts/discover_changed_openneuro_pipelines.py $CHANGED_FILES)
        fi
        echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  smoke-test-openneuro-pipelines:
    needs: discover-changed-openneuro-pipelines
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.discover-changed-openneuro-pipelines.outputs.matrix != '{"include":[]}'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-changed-openneuro-pipelines.outputs.matrix) }}
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.6.11"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install the project
      run: uv sync --all-extras

    - name: Setup brainsets config
      run: |
        uv run brainsets config set --raw-dir data/raw --processed-dir data/processed

    - name: Resolve session ID
      id: resolve-session
      run: |
        echo "session=${{ matrix.ci_smoke_session }}" >> $GITHUB_OUTPUT

    - name: Run smoke test for ${{ matrix.brainset_id }}
      run: |
        uv run brainsets prepare ${{ matrix.brainset_id }} \
          -s "${{ steps.resolve-session.outputs.session }}" \
          --on-version-mismatch continue

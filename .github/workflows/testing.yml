name: Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "*" ]

permissions:
  contents: read

env:
  # Temporary CI override: install torch_brain from this commit because
  # SEEGDatasetMixin is not yet available on torch_brain main. Revert by
  # removing TORCH_BRAIN_SHA and the "Override torch_brain to SEEG mixin SHA" step
  # after torch_brain main includes commit 8aa2335ce76c895d681148c22ef3dc01a2bc6fcc.
  TORCH_BRAIN_SHA: "8aa2335ce76c895d681148c22ef3dc01a2bc6fcc"

jobs:
  testing:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.6.11"
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install the project
      run: uv sync --all-extras

    - name: Override torch_brain to SEEG mixin SHA
      run: uv pip install --upgrade "torch_brain @ git+https://github.com/neuro-galaxy/torch_brain.git@${TORCH_BRAIN_SHA}"
      
    - name: Install plugin
      run: uv pip install pytest-github-actions-annotate-failures

    - name: Test with pytest
      run: |
        uv run pytest --cov=brainsets --cov-report=xml --cov-report=term-missing -v

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
